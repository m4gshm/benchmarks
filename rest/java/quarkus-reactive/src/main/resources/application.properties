quarkus.log.level=INFO
#quarkus.log.min-level=TRACE
quarkus.log.category."io.netty.handler.codec.http.websocketx.WebSocket08FrameEncoder".level=INFO
#quarkus.log.category."org.hibernate.SQL".level=INFO
#quarkus.log.category."reactive.sql".level=TRACE
#quarkus.log.category."reactive.sql".min-level=INFO
#
#quarkus.vertx.event-loops-pool-size=8
#
quarkus.native.resources.includes=**/*,db/migration/**,META-INF/**
#
#quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
#
quarkus.datasource.reactive.url=postgresql://localhost:5432/postgres
quarkus.datasource.reactive.max-size=100
quarkus.datasource.reactive.cache-prepared-statements=true
#quarkus.datasource.reactive.acquisition-timeout=10S
#
#quarkus.hibernate-orm."jdbc".database.generation=update
#quarkus.hibernate-orm."jdbc".packages=m4gshm.benchmark.rest.java.storage.model.jpa
#quarkus.hibernate-orm."jdbc".datasource=jdbc
#
#quarkus.datasource.jdbc.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:${quarkus.datasource.reactive.url}
quarkus.datasource.jdbc=true
#
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
#quarkus.flyway.active=true
#quarkus.flyway.blocking.baseline-on-migrate=true
#
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui