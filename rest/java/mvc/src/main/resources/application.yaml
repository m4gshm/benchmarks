springdoc:
  swagger-ui:
    use-root-path: true

spring:
  graphql:
    graphiql:
      enabled: true
  jpa:
    generate-ddl: true
  datasource:
    hikari:
      maximum-pool-size: 200
#      max-lifetime: 120000
#      minimum-idle: 0
    url: jdbc:postgresql://localhost:5433/postgres
    username: postgres
    password: postgres
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
server:
  tomcat:
    threads:
      max: 400
